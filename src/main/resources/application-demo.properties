# Public portfolio demo profile.
# Keep this profile explicit and environment-driven so demo deployments do not inherit local defaults.

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.flyway.clean-disabled=true

springdoc.api-docs.enabled=${SPRINGDOC_API_DOCS_ENABLED:false}
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGER_UI_ENABLED:false}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
app.frontend.customer-base-url=${CUSTOMER_FRONTEND_BASE_URL}
app.frontend.staff-base-url=${STAFF_FRONTEND_BASE_URL}

app.auth.refresh-cookie.secure=${AUTH_REFRESH_COOKIE_SECURE:true}
app.auth.refresh-cookie.same-site=${AUTH_REFRESH_COOKIE_SAME_SITE}

server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
