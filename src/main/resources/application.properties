spring.application.name=ai-car-rental
spring.config.import=optional:file:.env[.properties]
# DATABASE
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}

spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true

# FLYWAY
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.default-schema=rental
spring.flyway.schemas=rental
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:false}
spring.flyway.baseline-version=1
spring.flyway.validate-on-migrate=true

# KAFKA
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}

spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP_ID}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.listener.ack-mode=record

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=2147483647
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.max.in.flight.requests.per.connection=5

spring.kafka.consumer.key-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

spring.kafka.consumer.properties.spring.deserializer.key.delegate.class=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.aicarrental.common.event
spring.kafka.consumer.properties.spring.json.use.type.headers=true

app.kafka.retry.max-attempts=${KAFKA_CONSUMER_RETRY_MAX_ATTEMPTS:3}
app.kafka.retry.initial-interval-ms=${KAFKA_CONSUMER_RETRY_INITIAL_INTERVAL_MS:1000}
app.kafka.retry.multiplier=${KAFKA_CONSUMER_RETRY_MULTIPLIER:2.0}
app.kafka.retry.max-interval-ms=${KAFKA_CONSUMER_RETRY_MAX_INTERVAL_MS:10000}

outbox.publisher.fixed-delay-ms=${OUTBOX_PUBLISHER_FIXED_DELAY_MS:10000}
outbox.publisher.max-retries=${OUTBOX_PUBLISHER_MAX_RETRIES:5}
outbox.publisher.base-delay-seconds=${OUTBOX_PUBLISHER_BASE_DELAY_SECONDS:10}
outbox.publisher.max-delay-seconds=${OUTBOX_PUBLISHER_MAX_DELAY_SECONDS:300}
outbox.publisher.send-timeout-seconds=${OUTBOX_PUBLISHER_SEND_TIMEOUT_SECONDS:5}

# REDIS
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.cache.redis.time-to-live=${REDIS_CACHE_TTL_MS:900000}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# FRONTEND LINKS
app.frontend.customer-base-url=${CUSTOMER_FRONTEND_BASE_URL:http://localhost:4200}
app.frontend.staff-base-url=${STAFF_FRONTEND_BASE_URL:http://localhost:4200}

# EMAIL
app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:no-reply@aicarrental.local}
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED:true}

# PUBLIC AI SEARCH RATE LIMIT
ai.marketplace.rate-limit.max-requests=${AI_MARKETPLACE_RATE_LIMIT_MAX_REQUESTS:10}
ai.marketplace.rate-limit.window-seconds=${AI_MARKETPLACE_RATE_LIMIT_WINDOW_SECONDS:60}

# SPRING AI - GOOGLE GEMINI
spring.ai.model.chat=google-genai
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-2.5-flash-lite
spring.ai.google.genai.chat.options.response-mime-type=application/json
spring.ai.google.genai.chat.options.temperature=0.2

# JWT SETTINGS
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# AUTH COOKIE SETTINGS
app.auth.refresh-cookie.secure=${AUTH_REFRESH_COOKIE_SECURE:false}
app.auth.refresh-cookie.same-site=${AUTH_REFRESH_COOKIE_SAME_SITE:Lax}
