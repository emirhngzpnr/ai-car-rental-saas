spring.application.name=ai-car-rental
spring.config.import=optional:file:.env[.properties]
# DATABASE
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}

spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true

# FLYWAY
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.default-schema=rental
spring.flyway.schemas=rental
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:false}
spring.flyway.baseline-version=1
spring.flyway.validate-on-migrate=true

# KAFKA
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}

spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP_ID}
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=com.aicarrental.common.event

# REDIS
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# PUBLIC AI SEARCH RATE LIMIT
ai.marketplace.rate-limit.max-requests=${AI_MARKETPLACE_RATE_LIMIT_MAX_REQUESTS:10}
ai.marketplace.rate-limit.window-seconds=${AI_MARKETPLACE_RATE_LIMIT_WINDOW_SECONDS:60}

# SPRING AI - GOOGLE GEMINI
spring.ai.model.chat=google-genai
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-2.5-flash-lite
spring.ai.google.genai.chat.options.response-mime-type=application/json
spring.ai.google.genai.chat.options.temperature=0.2

# JWT SETTINGS
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# AUTH COOKIE SETTINGS
app.auth.refresh-cookie.secure=${AUTH_REFRESH_COOKIE_SECURE:false}
app.auth.refresh-cookie.same-site=${AUTH_REFRESH_COOKIE_SAME_SITE:Lax}
