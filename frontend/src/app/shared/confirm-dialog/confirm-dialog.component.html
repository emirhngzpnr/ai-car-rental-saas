<h2 mat-dialog-title>{{ data.title }}</h2>

<mat-dialog-content>
  <div class="confirm-body">
    <span class="confirm-icon" [class.confirm-icon--danger]="data.tone === 'danger'">
      <mat-icon>{{ data.tone === 'danger' ? 'warning' : 'help' }}</mat-icon>
    </span>
    <p>{{ data.message }}</p>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="cancel()">{{ data.cancelLabel || 'Cancel' }}</button>
  <button mat-flat-button [color]="data.tone === 'danger' ? 'warn' : 'primary'" type="button" (click)="confirm()">
    {{ data.confirmLabel || 'Confirm' }}
  </button>
</mat-dialog-actions>
