<section class="acr-page">
  <acr-page-header title="Tenants" description="Manage platform tenant accounts and activation status.">
    <div class="header-actions">
      <button mat-stroked-button type="button" (click)="loadTenants()" [disabled]="loading() || saving()">
        <mat-icon>refresh</mat-icon>
        Refresh
      </button>
      <button mat-flat-button color="primary" type="button" (click)="openCreateDialog()" [disabled]="saving()">
        <mat-icon>add</mat-icon>
        New tenant
      </button>
    </div>
  </acr-page-header>

  @if (error()) { <acr-error-state [message]="error()" /> }

  <section class="acr-panel tenants-panel">
    @if (loading()) {
      <acr-loading-state label="Loading tenants" />
    } @else if (tenants().length === 0) {
      <acr-empty-state icon="business" title="No tenants found" message="Create a tenant account before assigning users and fleet records." />
    } @else {
      <div class="table-wrap">
        <table mat-table [dataSource]="tenants()">
          <ng-container matColumnDef="tenant">
            <th mat-header-cell *matHeaderCellDef>Tenant</th>
            <td mat-cell *matCellDef="let tenant"><div class="stacked"><strong>{{ tenant.companyName }}</strong><span>#{{ tenant.id }}</span></div></td>
          </ng-container>
          <ng-container matColumnDef="contact">
            <th mat-header-cell *matHeaderCellDef>Contact</th>
            <td mat-cell *matCellDef="let tenant"><div class="stacked"><strong>{{ tenant.email }}</strong><span>{{ tenant.phoneNumber }}</span></div></td>
          </ng-container>
          <ng-container matColumnDef="subDomain">
            <th mat-header-cell *matHeaderCellDef>Subdomain</th>
            <td mat-cell *matCellDef="let tenant"><span class="code-pill">{{ tenant.subDomain }}</span></td>
          </ng-container>
          <ng-container matColumnDef="status">
            <th mat-header-cell *matHeaderCellDef>Status</th>
            <td mat-cell *matCellDef="let tenant"><acr-status-badge [status]="tenant.active ? 'ACTIVE' : 'PASSIVE'" /></td>
          </ng-container>
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef></th>
            <td mat-cell *matCellDef="let tenant" class="actions-cell">
              <button mat-icon-button type="button" matTooltip="Edit tenant" (click)="openEditDialog(tenant)"><mat-icon>edit</mat-icon></button>
              <button mat-icon-button type="button" matTooltip="Deactivate tenant" (click)="deactivateTenant(tenant)"><mat-icon>delete</mat-icon></button>
            </td>
          </ng-container>
          <tr mat-header-row *matHeaderRowDef="columns"></tr>
          <tr mat-row *matRowDef="let row; columns: columns;"></tr>
        </table>
      </div>
    }
  </section>
</section>
