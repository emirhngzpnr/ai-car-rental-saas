<h2 mat-dialog-title>Complete rental</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="rental-form">
    <div class="context-line">Rental #{{ data.rental.id }} - {{ data.rental.vehiclePlateNumber }}</div>
    <mat-form-field appearance="outline">
      <mat-label>Actual return date/time</mat-label>
      <input matInput type="datetime-local" formControlName="actualReturnDateTime">
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>End mileage</mat-label>
      <input matInput type="number" formControlName="endMileage">
      @if (form.controls.endMileage.hasError('min')) { <mat-error>End mileage cannot be lower than start mileage</mat-error> }
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button type="button" mat-dialog-close>Cancel</button>
  <button mat-flat-button color="primary" type="button" (click)="save()">Complete rental</button>
</mat-dialog-actions>
