services:
  postgres:
    image: postgres:16
    container_name: ai-car-rental-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ai_car_rental_pgdata:/var/lib/postgresql/data

volumes:
  ai_car_rental_pgdata: